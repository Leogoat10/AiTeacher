spring.application.name=AiTeacher
# DeepSeek API ??
deepseek.api.key=
deepseek.api.url=https://api.deepseek.com
deepseek.api.model=deepseek-v4-flash
deepseek.api.timeout.read-ms=120000

# Qwen OCR API 配置（图片识别）
qwen.api.url=https://dashscope.aliyuncs.com/compatible-mode/v1
qwen.api.key=${QWEN_API_KEY:}
qwen.api.model=qwen3.6-flash
qwen.api.timeout.read-ms=120000

server.port=8081

# Session 配置
server.servlet.session.timeout=30m
server.servlet.session.cookie.same-site=lax

# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/aiteacher?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus ??
mybatis-plus.mapper-locations=classpath*:/mapper/**Mapper.xml
mybatis.type-aliases-package=com.leo.aiteacher.pojo.mapper
